# Site Settings
title: "The Character Archive"
description: "Self-mastery for the whole body. Nervous system, gut health, mindset, and the philosophy of becoming."
url: "https://distinctcharacter.github.io"
baseurl: ""

# Theme
remote_theme: mmistakes/minimal-mistakes
minimal_mistakes_skin: "air"

# Author
author:
  name: "Distinct Character"
  bio: "Exploring self-mastery through the lens of the whole body: nervous system, gut health, psychology, and intuitive living."
  location: ""
  links:
    - label: "Substack"
      icon: "fas fa-fw fa-envelope"
      url: ""

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-remote-theme

# SEO
twitter:
  username: "theinnercraft"
og_image: ""

# Permalinks
permalink: /:categories/:title/

# Pagination
paginate: 10
paginate_path: /page:num/

# Reading Files
include:
  - _pages

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true
      related: true
      show_date: true
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

# Category and Tag Pages
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# Navigation
navigation:
  - title: "Home"
    url: /
  - title: "Categories"
    url: /categories/
  - title: "Tags"
    url: /tags/
  - title: "About"
    url: /about/

# Output
timezone: America/New_York
